name: Deploy to GitHub Pages

# Static-site deploy for analytics.polecat.live. Replaces GitHub's default
# "deploy from a branch" pipeline, which has NO concurrency control — the fast
# self-improvement loop pushes several commits per run, and those overlapping
# deploys collided under the managed pipeline ("Deployment failed, try again
# later"). Here a single `pages` concurrency group with cancel-in-progress
# means a newer push cancels an in-flight deploy, so only the latest one runs
# and it never fails on contention.
#
# NOTE: requires repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # SOFT test signal — this MUST NOT gate the live deploy. A hard `needs: test` gate was
  # briefly added and it FROZE the live site for ~21 hours: a flaky CI-only test (the
  # offline service-worker / PWA check reports catalogSize:0 on a cold runner and cascades
  # into a FATAL) failed the `test` job, so `deploy` never ran and ~55 versions never went
  # live while the repo kept advancing. The autonomous loop already runs the full Playwright
  # suite GREEN before every push (RESUME PROTOCOL), so re-testing in CI is redundant
  # belt-and-braces. `continue-on-error: true` keeps it as a visible signal (a red test job
  # tells the loop to harden a flaky test) WITHOUT ever blocking or failing the deploy.
  # DO NOT re-add `needs: test` to the deploy job — see STATUS.md "CI / deploy" convention.
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Playwright (global, no repo package.json)
        run: npm install -g playwright
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright test suite
        run: NODE_PATH=$(npm root -g) node tests/run.js

  deploy:
    # Intentionally NOT `needs: test` — the static site must stay live regardless of the
    # soft test signal above (a flaky test froze it for ~21h). Runs in parallel with test.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact (repo root — plain static site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
