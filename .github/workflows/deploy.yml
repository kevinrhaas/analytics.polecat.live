name: Deploy to GitHub Pages

# Static-site deploy for analytics.polecat.live. Replaces GitHub's default
# "deploy from a branch" pipeline, which has NO concurrency control — the fast
# self-improvement loop pushes several commits per run, and those overlapping
# deploys collided under the managed pipeline ("Deployment failed, try again
# later"). Here a single `pages` concurrency group with cancel-in-progress
# means a newer push cancels an in-flight deploy, so only the latest one runs
# and it never fails on contention.
#
# NOTE: requires repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Track L (test health): the pre-migration repo had a `test` job gating `publish` (see
  # STATUS.md v30) but it was lost in the v60 move to this standalone repo — `deploy` ran
  # unconditionally on every push, with no automated check that a broken commit (including one
  # from the autonomous loop) wasn't about to go live. Restored here: the Playwright suite has
  # no package.json/local devDependency (this repo intentionally ships no npm dependency
  # manifest — see the "no package installs" convention in STATUS.md), so install Playwright
  # globally, exactly like the documented local dev workflow (`NODE_PATH=$(npm root -g) node
  # tests/run.js`), and let tests/run.js fall back to Playwright's own installed Chromium since
  # the sandbox's prebuilt-browser path won't exist on a GitHub-hosted runner.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Playwright (global, no repo package.json)
        run: npm install -g playwright
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright test suite
        run: NODE_PATH=$(npm root -g) node tests/run.js

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact (repo root — plain static site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
